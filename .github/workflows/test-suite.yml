name: Test Suite

on:
  # Manual-only for now: this suite runs against a live personal dev org using
  # repo secrets, so it is triggered on demand rather than on every push/PR.
  workflow_dispatch:

jobs:
  # Runs in parallel with the Playwright jobs (no cross-job dependency).
  apex-tests:
    name: Apex tests
    timeout-minutes: 20
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Salesforce CLI
        run: npm install --global @salesforce/cli

      - name: Write JWT private key
        run: |
          mkdir -p .sfdx-keys
          printf '%s' "$SF_JWT_KEY" > .sfdx-keys/server.key
        env:
          SF_JWT_KEY: ${{ secrets.SF_JWT_KEY }}

      - name: Authenticate to org (JWT)
        run: |
          sf org login jwt \
            --username "$SF_USERNAME" \
            --jwt-key-file .sfdx-keys/server.key \
            --client-id "$SF_CLIENT_ID" \
            --instance-url "$SF_LOGIN_URL" \
            --set-default
        env:
          SF_USERNAME: ${{ secrets.SF_USERNAME }}
          SF_CLIENT_ID: ${{ secrets.SF_CLIENT_ID }}
          SF_LOGIN_URL: ${{ secrets.SF_LOGIN_URL }}

      - name: Run Apex tests (check-only deploy)
        # --dry-run validates the source against the org and runs local Apex
        # tests without committing any changes. --json captures per-method
        # results for the Allure report; `|| true` keeps this step from failing
        # here so the results are still converted/uploaded below — the "Fail if
        # Apex tests failed" step is the actual gate.
        run: |
          sf project deploy start \
            --dry-run \
            --source-dir force-app \
            --test-level RunLocalTests \
            --wait 20 \
            --json > apex-deploy.json || true

      - name: Convert Apex results to JUnit for Allure
        if: ${{ !cancelled() }}
        run: node scripts/apex-deploy-to-junit.mjs apex-deploy.json allure-apex

      - name: Upload Apex results
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: allure-apex
          path: allure-apex/
          retention-days: 7

      - name: Fail if Apex tests failed
        if: ${{ !cancelled() }}
        run: |
          node -e "const j=require('./apex-deploy.json'); if (j.status !== 0 || j.result?.success === false) { console.error('Apex validation/tests failed'); process.exit(1); }"

  # Pure REST API tests (the `api` Playwright project). No browser and no
  # Lightning session, so this is fast and needs no Playwright browser install.
  # Runs in parallel with apex-tests and the e2e shards.
  api-tests:
    name: API tests
    timeout-minutes: 15
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Write JWT private key
        run: |
          mkdir -p .sfdx-keys
          printf '%s' "$SF_JWT_KEY" > .sfdx-keys/server.key
        env:
          SF_JWT_KEY: ${{ secrets.SF_JWT_KEY }}

      - name: Run API tests
        run: npx playwright test --project=api
        env:
          SF_LOGIN_URL: ${{ secrets.SF_LOGIN_URL }}
          SF_USERNAME: ${{ secrets.SF_USERNAME }}
          SF_PASSWORD: ${{ secrets.SF_PASSWORD }}
          SF_CLIENT_ID: ${{ secrets.SF_CLIENT_ID }}
          SF_LIGHTNING_URL: ${{ secrets.SF_LIGHTNING_URL }}
          SF_JWT_KEY_FILE: .sfdx-keys/server.key

      - name: Upload Allure results (API)
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-api
          path: allure-results/
          retention-days: 7

  # Full Playwright UI suite in one job. Deliberately NOT sharded: the `auth`
  # project depends on `authenticated`, and Playwright runs a dependency in full
  # on every shard — so sharding would run the heavy `authenticated` suite on each
  # shard (doubling load on one dev org) instead of splitting it. Built-in retries
  # handle flakes: a test that passes on retry stays green; one that fails every
  # attempt turns the job red, so genuine failures are surfaced (not masked).
  e2e-tests:
    name: Playwright E2E
    timeout-minutes: 40
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Write JWT private key
        run: |
          mkdir -p .sfdx-keys
          printf '%s' "$SF_JWT_KEY" > .sfdx-keys/server.key
        env:
          SF_JWT_KEY: ${{ secrets.SF_JWT_KEY }}

      - name: Run Playwright UI tests
        run: npx playwright test --project=setup --project=authenticated --project=auth
        env:
          SF_LOGIN_URL: ${{ secrets.SF_LOGIN_URL }}
          SF_USERNAME: ${{ secrets.SF_USERNAME }}
          SF_PASSWORD: ${{ secrets.SF_PASSWORD }}
          SF_CLIENT_ID: ${{ secrets.SF_CLIENT_ID }}
          SF_LIGHTNING_URL: ${{ secrets.SF_LIGHTNING_URL }}
          SF_JWT_KEY_FILE: .sfdx-keys/server.key

      - name: Upload Allure results (E2E)
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-e2e
          path: allure-results/
          retention-days: 7

  # Collects Allure results from every source (E2E, API, Apex JUnit) into one
  # report, preserves trend history across runs, and publishes it to the gh-pages
  # branch (served by GitHub Pages).
  allure-report:
    name: Publish Allure report
    if: ${{ !cancelled() }}
    needs: [e2e-tests, api-tests, apex-tests]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all Allure results (E2E + API)
        uses: actions/download-artifact@v4
        with:
          path: allure-results
          pattern: allure-results-*
          merge-multiple: true

      - name: Download Apex JUnit results
        uses: actions/download-artifact@v4
        with:
          name: allure-apex
          path: apex-junit

      - name: Fold Apex JUnit into the Allure results
        run: cp apex-junit/*.xml allure-results/ || true

      # Playwright failure attachments (error-context snapshots, traces) can embed
      # a live session token — the frontdoor `sid=` URL or a `Bearer` header — which
      # GitHub push protection blocks from the public gh-pages deploy. Strip trace
      # files and redact token patterns from every text result before building.
      - name: Sanitize secrets from Allure results
        run: |
          find allure-results -type f \( -name '*.zip' -o -name '*trace*' \) -delete || true
          find allure-results -type f \( -name '*.json' -o -name '*.md' -o -name '*.txt' \) -print0 \
            | xargs -0 --no-run-if-empty sed -Ei 's/(sid=)[A-Za-z0-9._%!-]+/\1REDACTED/g; s/(Bearer )[A-Za-z0-9._-]+/\1REDACTED/g'

      # Restore the previous report history so Allure can render trend graphs.
      # Fails harmlessly on the first run when gh-pages does not exist yet.
      - name: Restore report history
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages

      - name: Generate Allure report (with history)
        uses: simple-elf/allure-report-action@master
        with:
          allure_results: allure-results
          gh_pages: gh-pages
          allure_history: allure-history
          keep_reports: 30

      # The generate action runs in Docker as root, so allure-history (and a
      # nested .git) is root-owned. Reclaim ownership and drop the stray .git so
      # the publish step can manage the branch without hitting EACCES.
      - name: Fix report ownership
        run: |
          sudo chown -R "$(id -u):$(id -g)" allure-history
          rm -rf allure-history/.git

      - name: Publish to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history
