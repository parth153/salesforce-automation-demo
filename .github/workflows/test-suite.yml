name: Test Suite

on:
  # Manual-only for now: this suite runs against a live personal dev org using
  # repo secrets, so it is triggered on demand rather than on every push/PR.
  workflow_dispatch:

jobs:
  # Runs in parallel with the Playwright jobs (no cross-job dependency).
  apex-tests:
    name: Apex tests
    timeout-minutes: 20
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Salesforce CLI
        run: npm install --global @salesforce/cli

      - name: Write JWT private key
        run: |
          mkdir -p .sfdx-keys
          printf '%s' "$SF_JWT_KEY" > .sfdx-keys/server.key
        env:
          SF_JWT_KEY: ${{ secrets.SF_JWT_KEY }}

      - name: Authenticate to org (JWT)
        run: |
          sf org login jwt \
            --username "$SF_USERNAME" \
            --jwt-key-file .sfdx-keys/server.key \
            --client-id "$SF_CLIENT_ID" \
            --instance-url "$SF_LOGIN_URL" \
            --set-default
        env:
          SF_USERNAME: ${{ secrets.SF_USERNAME }}
          SF_CLIENT_ID: ${{ secrets.SF_CLIENT_ID }}
          SF_LOGIN_URL: ${{ secrets.SF_LOGIN_URL }}

      - name: Run Apex tests (check-only deploy)
        # --dry-run validates the source against the org and runs local Apex
        # tests without committing any changes. --json captures per-method
        # results for the Allure report; `|| true` keeps this step from failing
        # here so the results are still converted/uploaded below — the "Fail if
        # Apex tests failed" step is the actual gate.
        run: |
          sf project deploy start \
            --dry-run \
            --source-dir force-app \
            --test-level RunLocalTests \
            --wait 20 \
            --json > apex-deploy.json || true

      - name: Convert Apex results to JUnit for Allure
        if: ${{ !cancelled() }}
        run: node scripts/apex-deploy-to-junit.mjs apex-deploy.json allure-apex

      - name: Upload Apex results
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: allure-apex
          path: allure-apex/
          retention-days: 7

      - name: Fail if Apex tests failed
        if: ${{ !cancelled() }}
        run: |
          node -e "const j=require('./apex-deploy.json'); if (j.status !== 0 || j.result?.success === false) { console.error('Apex validation/tests failed'); process.exit(1); }"

  # Pure REST API tests (the `api` Playwright project). No browser and no
  # Lightning session, so this is fast and needs no Playwright browser install.
  # Runs in parallel with apex-tests and the e2e shards.
  api-tests:
    name: API tests
    timeout-minutes: 15
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Write JWT private key
        run: |
          mkdir -p .sfdx-keys
          printf '%s' "$SF_JWT_KEY" > .sfdx-keys/server.key
        env:
          SF_JWT_KEY: ${{ secrets.SF_JWT_KEY }}

      - name: Run API tests
        run: npx playwright test --project=api
        env:
          SF_LOGIN_URL: ${{ secrets.SF_LOGIN_URL }}
          SF_USERNAME: ${{ secrets.SF_USERNAME }}
          SF_PASSWORD: ${{ secrets.SF_PASSWORD }}
          SF_CLIENT_ID: ${{ secrets.SF_CLIENT_ID }}
          SF_LIGHTNING_URL: ${{ secrets.SF_LIGHTNING_URL }}
          SF_JWT_KEY_FILE: .sfdx-keys/server.key

      - name: Upload Allure results (API)
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-api
          path: allure-results/
          retention-days: 7

  # Sharded Playwright run of the UI projects. Each shard is a separate runner in
  # the matrix and runs in parallel with the others, with apex-tests, and with
  # api-tests. The `api` project is excluded here — it has its own job above.
  e2e-tests:
    name: Playwright E2E (shard ${{ matrix.shardIndex }}/${{ matrix.shardTotal }})
    timeout-minutes: 30
    runs-on: ubuntu-latest
    # A shard failing does not fail the overall run: the retry-failed job below
    # re-runs any failures on a clean runner and is the real gate. This keeps the
    # build green when a flaky UI test passes on retry (shared dev-org timing).
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        shardIndex: [1, 2]
        shardTotal: [2]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Write JWT private key
        run: |
          mkdir -p .sfdx-keys
          printf '%s' "$SF_JWT_KEY" > .sfdx-keys/server.key
        env:
          SF_JWT_KEY: ${{ secrets.SF_JWT_KEY }}

      - name: Run Playwright tests (shard ${{ matrix.shardIndex }}/${{ matrix.shardTotal }})
        run: npx playwright test --project=setup --project=authenticated --project=auth --shard=${{ matrix.shardIndex }}/${{ matrix.shardTotal }}
        env:
          SF_LOGIN_URL: ${{ secrets.SF_LOGIN_URL }}
          SF_USERNAME: ${{ secrets.SF_USERNAME }}
          SF_PASSWORD: ${{ secrets.SF_PASSWORD }}
          SF_CLIENT_ID: ${{ secrets.SF_CLIENT_ID }}
          SF_LIGHTNING_URL: ${{ secrets.SF_LIGHTNING_URL }}
          SF_JWT_KEY_FILE: .sfdx-keys/server.key

      - name: Upload Allure results (shard ${{ matrix.shardIndex }})
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-e2e-${{ matrix.shardIndex }}
          path: allure-results/
          retention-days: 7

      - name: Upload last-run (failed test list)
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: last-run-${{ matrix.shardIndex }}
          path: test-results/.last-run.json
          retention-days: 7
          if-no-files-found: ignore

  # The real E2E gate. Always runs after the shards (which are continue-on-error),
  # gathers any failed tests from every shard, and re-runs just those on a clean
  # runner. If there were no failures it re-runs nothing and passes. This job's
  # result determines whether the E2E stage is green, so a flake that passes on
  # retry keeps the build green while a genuine failure turns it red.
  retry-failed:
    name: Re-run failed tests
    if: ${{ !cancelled() }}
    needs: [e2e-tests]
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Write JWT private key
        run: |
          mkdir -p .sfdx-keys
          printf '%s' "$SF_JWT_KEY" > .sfdx-keys/server.key
        env:
          SF_JWT_KEY: ${{ secrets.SF_JWT_KEY }}

      - name: Download per-shard last-run files
        uses: actions/download-artifact@v4
        with:
          path: last-runs
          pattern: last-run-*

      - name: Merge failed tests from all shards
        id: merge
        run: |
          node -e '
            const fs = require("fs"), path = require("path");
            const dir = "last-runs";
            let failed = [];
            if (fs.existsSync(dir)) {
              for (const sub of fs.readdirSync(dir)) {
                const f = path.join(dir, sub, ".last-run.json");
                if (fs.existsSync(f)) {
                  const j = JSON.parse(fs.readFileSync(f, "utf8"));
                  failed = failed.concat(j.failedTests || []);
                }
              }
            }
            failed = [...new Set(failed)];
            fs.writeFileSync("merged-last-run.json", JSON.stringify({ status: failed.length ? "failed" : "passed", failedTests: failed }));
            fs.appendFileSync(process.env.GITHUB_OUTPUT, "count=" + failed.length + "\n");
            console.log("Failed tests to re-run:", failed.length);
          '

      # Only when there were failures. If the shards were all green this step is
      # skipped and the job passes, keeping the gate green. Playwright would exit
      # non-zero on an empty --last-failed set, so we guard rather than run it.
      - name: Re-run failed tests
        if: ${{ steps.merge.outputs.count != '0' }}
        run: npx playwright test --last-failed --last-failed-file merged-last-run.json --reporter=list
        env:
          SF_LOGIN_URL: ${{ secrets.SF_LOGIN_URL }}
          SF_USERNAME: ${{ secrets.SF_USERNAME }}
          SF_PASSWORD: ${{ secrets.SF_PASSWORD }}
          SF_CLIENT_ID: ${{ secrets.SF_CLIENT_ID }}
          SF_LIGHTNING_URL: ${{ secrets.SF_LIGHTNING_URL }}
          SF_JWT_KEY_FILE: .sfdx-keys/server.key

  # Collects Allure results from every source (E2E shards, API, Apex JUnit) into
  # one report, preserves trend history across runs, and publishes it to the
  # gh-pages branch (served by GitHub Pages).
  allure-report:
    name: Publish Allure report
    if: ${{ !cancelled() }}
    needs: [e2e-tests, api-tests, apex-tests, retry-failed]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all Allure results (E2E + API)
        uses: actions/download-artifact@v4
        with:
          path: allure-results
          pattern: allure-results-*
          merge-multiple: true

      - name: Download Apex JUnit results
        uses: actions/download-artifact@v4
        with:
          name: allure-apex
          path: apex-junit

      - name: Fold Apex JUnit into the Allure results
        run: cp apex-junit/*.xml allure-results/ || true

      # Restore the previous report history so Allure can render trend graphs.
      # Fails harmlessly on the first run when gh-pages does not exist yet.
      - name: Restore report history
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages

      - name: Generate Allure report (with history)
        uses: simple-elf/allure-report-action@master
        with:
          allure_results: allure-results
          gh_pages: gh-pages
          allure_history: allure-history
          keep_reports: 30

      # The generate action runs in Docker as root, so allure-history (and a
      # nested .git) is root-owned. Reclaim ownership and drop the stray .git so
      # the publish step can manage the branch without hitting EACCES.
      - name: Fix report ownership
        run: |
          sudo chown -R "$(id -u):$(id -g)" allure-history
          rm -rf allure-history/.git

      - name: Publish to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history
